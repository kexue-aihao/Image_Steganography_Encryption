name: Windows Package

on:
  workflow_dispatch:
    inputs:
      app_version:
        description: 应用版本号，例如 0.1.0
        required: true
        default: 0.1.0
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-package:
    name: 构建并打包 Windows 安装包
    runs-on: windows-latest
    env:
      PROJECT_PATH: PictureEncryptionApp/PictureEncryptionApp.csproj

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 解析版本号
        id: meta
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version = "${{ inputs.app_version }}"
            $tagName = ""
          }
          else {
            $tagName = "${{ github.ref_name }}"
            if (-not $tagName.StartsWith("v")) {
              throw "标签名必须以 v 开头，例如 v0.1.0"
            }

            $version = $tagName.Substring(1)
          }

          if ([string]::IsNullOrWhiteSpace($version)) {
            throw "版本号不能为空。"
          }

          if ($version -notmatch '^\d+\.\d+\.\d+([\-+][0-9A-Za-z\.-]+)?$') {
            throw "版本号格式不正确。请使用例如 0.1.0、0.1.0-rc1 这样的格式。"
          }

          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "artifact_name=PictureEncryptionApp-$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: 安装 .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: 设置输出目录
        shell: pwsh
        run: |
          $publishDir = Join-Path $env:RUNNER_TEMP 'PictureEncryptionApp\publish'
          $installerDir = Join-Path $env:RUNNER_TEMP 'PictureEncryptionApp\installer'

          "PUBLISH_DIR=$publishDir" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "INSTALLER_DIR=$installerDir" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

          New-Item -ItemType Directory -Force -Path $publishDir | Out-Null
          New-Item -ItemType Directory -Force -Path $installerDir | Out-Null

      - name: 还原依赖
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: 构建工程
        run: dotnet build ${{ env.PROJECT_PATH }} -c Release --no-restore

      - name: 发布单文件 EXE
        shell: pwsh
        run: |
          dotnet publish $env:PROJECT_PATH `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:EnableCompressionInSingleFile=true `
            -o $env:PUBLISH_DIR

      - name: 安装 Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: 编译安装包
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            throw "未找到 Inno Setup 编译器: $iscc"
          }

          if (-not (Test-Path "$env:PUBLISH_DIR\PictureEncryptionApp.exe")) {
            throw "未找到已发布的 EXE: $env:PUBLISH_DIR\PictureEncryptionApp.exe"
          }

          if (-not (Test-Path "${{ github.workspace }}\PictureEncryptionApp\Assets\AppIcon.ico")) {
            throw "未找到安装包图标: ${{ github.workspace }}\PictureEncryptionApp\Assets\AppIcon.ico"
          }

          & $iscc `
            "/DMyAppVersion=${{ steps.meta.outputs.version }}" `
            "/DMyPublishDir=$env:PUBLISH_DIR" `
            "/DMyOutputDir=$env:INSTALLER_DIR" `
            "/DMyIconFile=${{ github.workspace }}\PictureEncryptionApp\Assets\AppIcon.ico" `
            "installer\PictureEncryptionApp.iss"

      - name: 上传发布产物
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.artifact_name }}
          path: |
            ${{ env.PUBLISH_DIR }}
            ${{ env.INSTALLER_DIR }}
          if-no-files-found: error
